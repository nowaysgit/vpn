name: vpn

services:
  customer-web:
    build:
      context: ../..
      dockerfile: apps/customer-web/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-vpn}-customer-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      API_BASE_URL: ${API_BASE_URL}
    networks:
      - internal
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=${EDGE_NETWORK:-vds-edge}
      - traefik.http.services.vpn-customer-web.loadbalancer.server.port=3000
      - traefik.http.middlewares.vpn-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.vpn-customer-web-http.rule=Host(`${CUSTOMER_DOMAIN}`)
      - traefik.http.routers.vpn-customer-web-http.entrypoints=web
      - traefik.http.routers.vpn-customer-web-http.middlewares=vpn-https-redirect
      - traefik.http.routers.vpn-customer-web.rule=Host(`${CUSTOMER_DOMAIN}`)
      - traefik.http.routers.vpn-customer-web.entrypoints=websecure
      - traefik.http.routers.vpn-customer-web.tls=true
      - traefik.http.routers.vpn-customer-web.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.vpn-customer-web.service=vpn-customer-web

networks:
  internal:
    name: ${COMPOSE_PROJECT_NAME:-vpn}-internal
  edge:
    name: ${EDGE_NETWORK:-vds-edge}
    external: true
