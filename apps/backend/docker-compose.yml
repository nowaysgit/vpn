name: vpn

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-vpn}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vpn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-vpn}-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      PG_BOSS_SCHEMA: ${PG_BOSS_SCHEMA:-pgboss}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      TBANK_API_BASE_URL: ${TBANK_API_BASE_URL:-https://securepay.tinkoff.ru}
      TBANK_TERMINAL_KEY: ${TBANK_TERMINAL_KEY}
      TBANK_PASSWORD: ${TBANK_PASSWORD}
      TBANK_NOTIFICATION_URL: ${TBANK_NOTIFICATION_URL}
      TBANK_SUCCESS_URL: ${TBANK_SUCCESS_URL}
      TBANK_FAIL_URL: ${TBANK_FAIL_URL}
      TBANK_RECEIPT_TAXATION: ${TBANK_RECEIPT_TAXATION}
      TBANK_RECEIPT_TAX: ${TBANK_RECEIPT_TAX:-none}
      TBANK_RECEIPT_PAYMENT_METHOD: ${TBANK_RECEIPT_PAYMENT_METHOD:-full_payment}
      TBANK_RECEIPT_PAYMENT_OBJECT: ${TBANK_RECEIPT_PAYMENT_OBJECT:-service}
      PLATEGA_API_BASE_URL: ${PLATEGA_API_BASE_URL}
      PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID}
      PLATEGA_SECRET: ${PLATEGA_SECRET}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-smtp}
      EMAIL_VERIFICATION_BASE_URL: ${EMAIL_VERIFICATION_BASE_URL}
      YANDEX360_SMTP_HOST: ${YANDEX360_SMTP_HOST:-smtp.yandex.com}
      YANDEX360_SMTP_PORT: ${YANDEX360_SMTP_PORT:-465}
      YANDEX360_SMTP_USERNAME: ${YANDEX360_SMTP_USERNAME}
      YANDEX360_SMTP_PASSWORD: ${YANDEX360_SMTP_PASSWORD}
      YANDEX360_FROM_EMAIL: ${YANDEX360_FROM_EMAIL}
      YANDEX360_FROM_NAME: ${YANDEX360_FROM_NAME:-VPN Cabinet}
      YANDEX360_DOMAIN: ${YANDEX360_DOMAIN}
      YANDEX360_DKIM_SELECTOR: ${YANDEX360_DKIM_SELECTOR:-mail}
      YANDEX360_EXPECTED_SPF_INCLUDE: ${YANDEX360_EXPECTED_SPF_INCLUDE:-_spf.yandex.net}
      YANDEX360_EXPECTED_MX: ${YANDEX360_EXPECTED_MX:-mx.yandex.net}
      MARZBAN_BASE_URL: ${MARZBAN_BASE_URL}
      MARZBAN_USERNAME: ${MARZBAN_USERNAME}
      MARZBAN_PASSWORD: ${MARZBAN_PASSWORD}
      TELEGRAM_BOT_SECRET: ${TELEGRAM_BOT_SECRET}
    networks:
      - internal
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=${EDGE_NETWORK:-vds-edge}
      - traefik.http.services.vpn-api.loadbalancer.server.port=3001
      - traefik.http.middlewares.vpn-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.vpn-api-http.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.vpn-api-http.entrypoints=web
      - traefik.http.routers.vpn-api-http.middlewares=vpn-https-redirect
      - traefik.http.routers.vpn-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.vpn-api.entrypoints=websecure
      - traefik.http.routers.vpn-api.tls=true
      - traefik.http.routers.vpn-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.vpn-api.service=vpn-api

volumes:
  postgres_data:

networks:
  internal:
    name: ${COMPOSE_PROJECT_NAME:-vpn}-internal
  edge:
    name: ${EDGE_NETWORK:-vds-edge}
    external: true
